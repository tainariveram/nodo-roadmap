<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodo App — Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#f8f9fc;--bg-white:#fff;--bg-secondary:#f0f1f5;
    --text:#1a1d26;--text-secondary:#6b7280;--text-tertiary:#9ca3af;
    --border:rgba(0,0,0,.06);
    --card-bg:#fff;--card-border:rgba(0,0,0,.05);
    --card-shadow:0 1px 3px rgba(0,0,0,.04),0 6px 16px rgba(0,0,0,.04);
    --tooltip-bg:rgba(255,255,255,.96);--tooltip-shadow:0 12px 48px rgba(0,0,0,.12);
    --today-color:#ff4757;--accent:#3BB1BD;
    --modal-bg:rgba(255,255,255,.97);--overlay:rgba(0,0,0,.25);
    --status-done:#22c55e;--status-progress:#3b82f6;--status-behind:#ef4444;--status-pending:#d1d5db;
    --col-line:rgba(0,0,0,.04);
  }
  body.dark{
    --bg:#0f1117;--bg-white:#1a1d26;--bg-secondary:#252830;
    --text:#f1f3f7;--text-secondary:#8b8fa3;--text-tertiary:#555869;
    --border:rgba(255,255,255,.07);
    --card-bg:#1a1d26;--card-border:rgba(255,255,255,.06);
    --card-shadow:0 1px 3px rgba(0,0,0,.2),0 6px 16px rgba(0,0,0,.15);
    --tooltip-bg:rgba(26,29,38,.96);--tooltip-shadow:0 12px 48px rgba(0,0,0,.4);
    --modal-bg:rgba(26,29,38,.97);--overlay:rgba(0,0,0,.5);
    --col-line:rgba(255,255,255,.04);
  }

  body{
    font-family:'Inter',-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    -webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
  }

  .top-bar{position:fixed;top:0;right:0;z-index:1000;display:flex;gap:8px;padding:20px 24px}
  .icon-btn{
    width:38px;height:38px;border-radius:12px;border:none;background:var(--card-bg);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .3s;box-shadow:0 1px 4px rgba(0,0,0,.06);color:var(--text-secondary);
  }
  .icon-btn:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .icon-btn.active{background:var(--accent);color:#fff}

  .header{padding:56px 56px 20px;max-width:1400px;margin:0 auto}
  .header-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:8px}
  .header-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3BB1BD,#5B8DEF);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;flex-shrink:0}
  .header h1{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
  .header .subtitle{font-size:15px;color:var(--text-secondary);font-weight:400;margin-top:2px}
  .app-summary{font-size:14px;color:var(--text-tertiary);margin-top:8px;max-width:600px;line-height:1.6;margin-left:68px}

  .progress-row{display:flex;gap:16px;padding:16px 56px 8px;max-width:1400px;margin:0 auto;overflow-x:auto}
  .progress-card{
    background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;
    padding:16px 20px;min-width:200px;flex:1;box-shadow:var(--card-shadow);
    transition:transform .2s,box-shadow .2s;
  }
  .progress-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .pc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .pc-dot{width:8px;height:8px;border-radius:50%}
  .pc-name{font-size:13px;font-weight:600;color:var(--text)}
  .pc-dates{font-size:11px;color:var(--text-tertiary);margin-left:auto}
  .pc-bar-bg{height:6px;border-radius:3px;background:var(--bg-secondary);overflow:hidden}
  .pc-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
  .pc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .pc-pct{font-size:20px;font-weight:700}
  .pc-count{font-size:11px;color:var(--text-tertiary)}

  .timeline{padding:20px 56px 48px;max-width:1400px;margin:0 auto}
  .months-bar{
    display:grid;grid-template-columns:220px 1fr;margin-bottom:20px;
    position:sticky;top:0;z-index:100;
    background:var(--bg);padding:12px 0;
    border-bottom:1px solid var(--border);transition:background .4s;
  }
  .months-bar-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;padding:4px 0}
  .months-track{display:grid;grid-template-columns:repeat(3,1fr);position:relative}
  .month-label{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text-tertiary);padding:4px 0 4px 8px;text-transform:uppercase}

  .col-dividers{position:absolute;top:0;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(3,1fr);pointer-events:none;z-index:1}
  .col-div{border-left:1px dashed var(--col-line)}
  .col-div:first-child{border-left:none}

  .phase{margin-bottom:24px}
  .phase-card{
    background:var(--card-bg);border:1px solid var(--card-border);
    border-radius:20px;padding:20px 24px 22px;
    box-shadow:var(--card-shadow);overflow:visible;
  }
  .phase-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .phase-color-bar{width:4px;height:28px;border-radius:2px;flex-shrink:0}
  .phase-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .phase-dates-label{font-size:13px;color:var(--text-tertiary);font-weight:400;margin-left:4px}
  .phase-result-tag{margin-left:auto;font-size:12px;font-weight:500;padding:4px 12px;border-radius:100px;background:var(--bg-secondary);color:var(--text-secondary)}
  .phase-progress-tag{font-size:12px;font-weight:700;margin-left:8px;padding:4px 10px;border-radius:100px}

  .gantt-rows{display:flex;flex-direction:column;gap:8px;overflow:visible}
  .gantt-row{
    display:grid;grid-template-columns:220px 1fr;align-items:center;
    min-height:52px;overflow:visible;border-radius:12px;padding:4px 8px;
    transition:background .2s;position:relative;
  }
  .gantt-row.editable{cursor:pointer}
  .gantt-row.editable:hover{background:var(--bg-secondary)}
  .gantt-row:hover{z-index:50}

  .row-label{padding-right:12px;display:flex;align-items:center;gap:8px}
  .row-label-text .name{font-size:13px;font-weight:600;letter-spacing:-.1px;color:var(--text)}
  .row-label-text .meta{font-size:11px;color:var(--text-tertiary);line-height:1.4;margin-top:1px}
  .row-track{position:relative;height:44px;overflow:visible}

  .bar{
    position:absolute;height:40px;border-radius:10px;top:2px;
    transition:all .25s ease;cursor:pointer;overflow:visible;
    min-width:40px;display:flex;align-items:center;padding:0 12px;gap:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
  }
  .bar:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:10}
  .bar.done{opacity:.65}
  .bar.behind{box-shadow:inset 0 0 0 2px var(--status-behind),0 2px 6px rgba(0,0,0,.08)}

  .bar-text{color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.15)}
  .bar-sub{color:rgba(255,255,255,.8);font-size:10px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-content{overflow:hidden;min-width:0}

  .bar-avatar{
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:#fff;flex-shrink:0;
    background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.4);margin-left:auto;
  }

  .bar .tip{
    display:none;position:absolute;bottom:calc(100% + 14px);left:0;
    background:var(--tooltip-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border);padding:18px 22px;border-radius:16px;
    width:320px;z-index:200;box-shadow:var(--tooltip-shadow);pointer-events:none;
  }
  .bar:hover .tip{display:block}
  .tip-name{font-size:14px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
  .tip-dates{font-size:11px;color:var(--text-tertiary);margin-bottom:8px}
  .tip-desc{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-bottom:10px}
  .tip-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tip-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;color:#fff}
  .tip-assignee-tag{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px}
  .tip-notes{font-size:12px;color:var(--text-secondary);margin-top:8px;font-style:italic;border-top:1px solid var(--border);padding-top:8px}

  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .status-done{background:var(--status-done)}
  .status-in_progress{background:var(--status-progress);animation:pulse 2s infinite}
  .status-behind{background:var(--status-behind);animation:pulse 1.5s infinite}
  .status-pending{background:var(--status-pending)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .milestone-row{display:grid;grid-template-columns:220px 1fr;align-items:center;min-height:48px;margin:12px 0;position:relative;border-radius:12px}
  .milestone-row::before{content:'';position:absolute;inset:0;border-radius:12px;pointer-events:none}
  .milestone-label-area{display:flex;align-items:center;gap:10px;padding-left:12px;z-index:1}
  .milestone-diamond{width:12px;height:12px;transform:rotate(45deg);border-radius:3px;flex-shrink:0}
  .milestone-info{z-index:1}
  .milestone-name{font-size:13px;font-weight:700;letter-spacing:-.2px;display:block}
  .milestone-sub{font-size:11px;color:var(--text-secondary);display:block;margin-top:1px}
  .milestone-track{position:relative;height:44px;z-index:1}
  .milestone-pip{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:8px}
  .milestone-date{font-size:12px;font-weight:700;white-space:nowrap;padding:5px 14px;border-radius:100px;border:1.5px solid}

  .launch-row{display:grid;grid-template-columns:220px 1fr;align-items:center;min-height:64px;margin:16px 0;position:relative;border-radius:16px;overflow:hidden}
  .launch-row::before{content:'';position:absolute;inset:0;pointer-events:none}
  .launch-row.soft::before{background:linear-gradient(90deg,rgba(232,168,56,.08),rgba(232,168,56,.02))}
  .launch-row.official::before{background:linear-gradient(90deg,rgba(59,219,150,.08),rgba(59,219,150,.02))}
  .launch-label-area{display:flex;align-items:center;gap:12px;padding-left:16px;z-index:1}
  .launch-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:#fff;font-weight:800}
  .launch-icon.soft{background:linear-gradient(135deg,#E8A838,#f0c060)}
  .launch-icon.official{background:linear-gradient(135deg,#3BDB96,#2ecb85)}
  .launch-info{z-index:1}
  .launch-title{font-size:15px;font-weight:800;letter-spacing:-.3px;display:block}
  .launch-subtitle{font-size:12px;color:var(--text-secondary);display:block;margin-top:1px}
  .launch-track{position:relative;height:52px;z-index:1}
  .launch-pip{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px}
  .launch-diamond{width:18px;height:18px;transform:rotate(45deg);border-radius:4px;flex-shrink:0}
  .launch-diamond.soft{background:#E8A838;box-shadow:0 0 0 4px rgba(232,168,56,.2),0 0 20px rgba(232,168,56,.12)}
  .launch-diamond.official{background:#3BDB96;box-shadow:0 0 0 4px rgba(59,219,150,.2),0 0 20px rgba(59,219,150,.12)}
  .launch-date-badge{font-size:13px;font-weight:700;white-space:nowrap;padding:6px 16px;border-radius:100px;border:1.5px solid}
  .launch-date-badge.soft{color:#E8A838;border-color:rgba(232,168,56,.3);background:rgba(232,168,56,.08)}
  .launch-date-badge.official{color:#3BDB96;border-color:rgba(59,219,150,.3);background:rgba(59,219,150,.08)}

  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today-color);z-index:5;pointer-events:none;opacity:.5;border-radius:1px}
  .today-dot{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--today-color);box-shadow:0 0 0 3px rgba(255,71,87,.2)}
  .today-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--today-color);letter-spacing:.8px;text-transform:uppercase}

  .parallel-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:.3px;margin:4px 0 14px;text-transform:uppercase}
  .parallel-tag::before{content:'';width:16px;height:1.5px;background:var(--text-tertiary);opacity:.3;border-radius:1px}
  .parallel-wrap{border-left:2.5px solid var(--border);padding-left:20px;margin-left:6px;overflow:visible}

  .flow-box{margin:12px 0 16px;padding:14px 18px;background:var(--bg-secondary);border-radius:12px}
  .flow-label{font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
  .flow-chain{display:flex;align-items:center;flex-wrap:wrap;gap:3px;justify-content:center}
  .flow-chip{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;background:var(--card-bg);border:1px solid var(--border);color:var(--text-secondary)}
  .flow-sep{color:var(--text-tertiary);font-size:14px;padding:0 2px}

  .legend{display:flex;gap:20px;padding:20px 56px;max-width:1400px;margin:0 auto;border-top:1px solid var(--border);flex-wrap:wrap;justify-content:center}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-tertiary);font-weight:500}
  .legend-pip{width:8px;height:8px;border-radius:3px}
  .legend-circle{width:8px;height:8px;border-radius:50%}
  .legend-diamond{width:8px;height:8px;transform:rotate(45deg);border-radius:2px;background:#E8A838}

  .modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .modal-overlay.show{display:flex}
  .modal{background:var(--modal-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--card-border);border-radius:24px;padding:28px;width:400px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.15)}
  .modal h3{font-size:17px;font-weight:700;margin-bottom:18px;letter-spacing:-.3px}
  .modal-field{margin-bottom:14px}
  .modal-field label{display:block;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .modal-field select,.modal-field textarea,.modal-field input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text);font-family:inherit;font-size:13px;transition:border .2s;outline:none}
  .modal-field select:focus,.modal-field textarea:focus,.modal-field input:focus{border-color:var(--accent)}
  .modal-field textarea{resize:vertical;min-height:56px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .btn{padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-secondary{background:var(--bg-secondary);color:var(--text-secondary)}
  .btn-secondary:hover{opacity:.8}

  .token-info{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:14px}
  .token-info a{color:var(--accent)}
  .token-info code{font-size:11px;background:var(--bg-secondary);padding:2px 6px;border-radius:4px}

  .admin-badge{position:fixed;bottom:20px;right:20px;z-index:999;padding:8px 16px;border-radius:100px;font-size:11px;font-weight:700;background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(59,177,189,.3);display:none;letter-spacing:.3px}
  .admin-badge.show{display:block}

  .status-legend{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .status-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)}

  .loading{text-align:center;padding:120px 0;font-size:15px;color:var(--text-secondary)}

  @media(max-width:768px){
    .header,.timeline,.legend,.progress-row{padding-left:20px;padding-right:20px}
    .header h1{font-size:26px}
    .gantt-row,.milestone-row,.launch-row,.months-bar{grid-template-columns:160px 1fr}
    .progress-row{flex-wrap:nowrap}
    .progress-card{min-width:160px}
    .modal{padding:20px}
    .bar{padding:0 8px}
    .bar-text{font-size:10px}
  }
</style>
</head>
<body>

<div class="top-bar">
  <button class="icon-btn" id="adminToggle" onclick="toggleAdmin()" title="Admin mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
    <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="admin-badge" id="adminBadge">Admin Mode</div>
<div id="app"><div class="loading">Loading roadmap...</div></div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editTitle">Edit Task</h3>
    <div class="status-legend">
      <div class="status-legend-item"><div class="status-dot status-done"></div>Done</div>
      <div class="status-legend-item"><div class="status-dot status-in_progress"></div>In Progress</div>
      <div class="status-legend-item"><div class="status-dot status-behind"></div>Behind</div>
      <div class="status-legend-item"><div class="status-dot status-pending"></div>Pending</div>
    </div>
    <div class="modal-field"><label>Status</label><select id="editStatus"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="done">Done</option><option value="behind">Behind Schedule</option></select></div>
    <div class="modal-field"><label>Assignee</label><select id="editAssignee"></select></div>
    <div class="modal-field"><label>Notes</label><textarea id="editNotes" placeholder="Add a note..."></textarea></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEdit()">Save</button></div>
  </div>
</div>

<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>Connect to GitHub</h3>
    <div class="token-info">To save changes, enter a GitHub Personal Access Token with <code>repo</code> scope.<br><br><a href="https://github.com/settings/tokens/new?scopes=repo&description=Nodo+Roadmap" target="_blank">Create token on GitHub</a></div>
    <div class="modal-field"><label>Repository</label><input id="tokenRepo" placeholder="owner/repo-name" /></div>
    <div class="modal-field"><label>Token</label><input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" /></div>
    <div class="modal-field"><label>Branch (optional)</label><input id="tokenBranch" placeholder="main" value="main" /></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeTokenModal()">Cancel</button><button class="btn btn-primary" onclick="saveToken()">Connect</button></div>
  </div>
</div>

<script>
let data=null,adminMode=false,ghToken='',ghRepo='',ghBranch='main',editingTask=null,editingSource=null,fileSha='';
const TS=new Date('2026-03-01'),TE=new Date('2026-05-31'),TD=(TE-TS)/864e5;
function dayPos(d){return((new Date(d)-TS)/864e5/TD*100)}
function dayWidth(s,e){return((new Date(e)-new Date(s))/864e5/TD*100)}
function todayPos(){return Math.max(0,Math.min(100,(new Date()-TS)/864e5/TD*100))}
function fmtRange(s,e){const f=d=>{const dd=new Date(d);return dd.toLocaleDateString('es',{month:'short',day:'numeric'})};return f(s)+' – '+f(e)}
const sunSVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const moonSVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
function toggleTheme(){document.body.classList.toggle('dark');document.getElementById('themeIcon').innerHTML=document.body.classList.contains('dark')?sunSVG:moonSVG}
async function loadData(){try{const r=await fetch('data.json?t='+Date.now());data=await r.json();render()}catch(e){document.getElementById('app').innerHTML='<div class="loading">Error loading data.json</div>';console.error(e)}}
function getTeam(id){return(data.team||[]).find(t=>t.id===id)}
function sc(s){return s||'pending'}
function phaseProgress(pid){const p=data.phases[pid];if(!p)return{done:0,total:0,pct:0};const total=p.tasks.length,done=p.tasks.filter(t=>t.status==='done').length;return{done,total,pct:total?Math.round(done/total*100):0}}

function render(){
  if(!data)return;const app=document.getElementById('app'),tp=todayPos();
  let h=`<div class="header"><div class="header-top"><div class="header-icon">N</div><div><h1>${data.config.title}</h1><div class="subtitle">${data.config.subtitle}</div></div></div><p class="app-summary">${data.config.summary}</p></div>`;
  h+='<div class="progress-row">';
  const pids=['fase-1','fase-1.5','fase-2','fase-3'],pcols={'fase-1':'#3BB1BD','fase-1.5':'#9B6DD7','fase-2':'#E8A838','fase-3':'#3BDB96'};
  pids.forEach(pid=>{const p=data.phases[pid];if(!p)return;const pr=phaseProgress(pid);h+=`<div class="progress-card"><div class="pc-top"><div class="pc-dot" style="background:${pcols[pid]}"></div><div class="pc-name">${p.name.split('—')[0].trim()}</div><div class="pc-dates">${p.dates}</div></div><div class="pc-bar-bg"><div class="pc-bar-fill" style="width:${pr.pct}%;background:${pcols[pid]}"></div></div><div class="pc-bottom"><div class="pc-pct" style="color:${pcols[pid]}">${pr.pct}%</div><div class="pc-count">${pr.done}/${pr.total} done</div></div></div>`});
  h+='</div>';
  h+=`<div class="timeline"><div class="months-bar"><div class="months-bar-label">Tasks</div><div class="months-track"><div class="month-label">Marzo</div><div class="month-label">Abril</div><div class="month-label">Mayo</div></div></div><div style="position:relative">`;
  h+=`<div style="display:grid;grid-template-columns:220px 1fr;position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none;z-index:1"><div></div><div class="col-dividers"><div class="col-div"></div><div class="col-div"></div><div class="col-div"></div></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:220px 1fr;position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none;z-index:5"><div></div><div style="position:relative"><div class="today-line" style="left:${tp}%"><div class="today-dot"></div><div class="today-label">Hoy</div></div></div></div>`;
  for(const item of data.layout){
    if(item.type==='phase')h+=renderPhase(item.id);
    else if(item.type==='milestone'){const m=data.milestones.find(x=>x.id===item.id);if(m)h+=renderMilestone(m)}
    else if(item.type==='launch'){const m=data.milestones.find(x=>x.id===item.id);if(m)h+=renderLaunch(m)}
    else if(item.type==='standalone'){const s=data.standalone.find(x=>x.id===item.id);if(s)h+=renderStandalone(s)}
    else if(item.type==='parallel-start')h+=`<div class="parallel-tag">${item.label}</div><div class="parallel-wrap">`;
    else if(item.type==='parallel-end')h+='</div>';
  }
  h+='</div></div>';
  h+=`<div class="legend"><div class="legend-item"><div class="legend-pip" style="background:#3BB1BD"></div>Build</div><div class="legend-item"><div class="legend-pip" style="background:#9B6DD7"></div>Testing</div><div class="legend-item"><div class="legend-pip" style="background:#E8A838"></div>Control</div><div class="legend-item"><div class="legend-pip" style="background:#3BDB96"></div>Escalamiento</div><div class="legend-item"><div class="legend-pip" style="background:#5B8DEF"></div>Post-Launch</div><div class="legend-item"><div class="legend-diamond"></div>Milestone</div><div class="legend-item"><div class="legend-circle" style="background:var(--today-color)"></div>Hoy</div><div class="legend-item"><div class="status-dot status-done"></div>Done</div><div class="legend-item"><div class="status-dot status-in_progress"></div>In Progress</div><div class="legend-item"><div class="status-dot status-behind"></div>Behind</div></div>`;
  app.innerHTML=h;
}

function renderPhase(pid){
  const phase=data.phases[pid];if(!phase)return'';const pr=phaseProgress(pid);
  const pctColor=pr.pct===100?'#22c55e':pr.pct>0?'#3b82f6':'var(--text-tertiary)';
  let h=`<div class="phase"><div class="phase-card"><div class="phase-top"><div class="phase-color-bar" style="background:${phase.color}"></div><div><span class="phase-title">${phase.name}</span><span class="phase-dates-label">${phase.dates}</span></div><span class="phase-progress-tag" style="color:${pctColor};background:${pctColor}15">${pr.pct}%</span><div class="phase-result-tag">${phase.result}</div></div><div class="gantt-rows">`;
  phase.tasks.forEach((task,i)=>{
    const left=dayPos(task.startDate),width=dayWidth(task.startDate,task.endDate),s=sc(task.status),member=getTeam(task.assignee);
    const barBg=task.striped?`background:repeating-linear-gradient(-45deg,${phase.color}dd,${phase.color}dd 5px,${phase.color} 5px,${phase.color} 10px)`:`background:${phase.color}`;
    const dash=task.dashed?';border-right:3px dashed rgba(255,255,255,.4)':'';
    const rowClick=adminMode?`onclick="openEdit('phase','${pid}',${i})"`:'';
    const ec=adminMode?' editable':'';
    h+=`<div class="gantt-row${ec}" ${rowClick}><div class="row-label"><div class="status-dot status-${s}"></div><div class="row-label-text"><div class="name">${task.name}</div>${task.meta?`<div class="meta">${task.meta}</div>`:''}</div></div><div class="row-track"><div class="bar ${s}" style="left:${left}%;width:${width}%;${barBg}${dash}"><div class="bar-content"><div class="bar-text">${task.name.split('—').pop().trim()}</div></div>${member?`<div class="bar-avatar" title="${member.name}">${member.initials}</div>`:''}<div class="tip"><div class="tip-name">${task.name}</div><div class="tip-dates">${fmtRange(task.startDate,task.endDate)}</div><div class="tip-desc">${task.description}</div><div class="tip-meta"><div class="tip-tag" style="background:var(--status-${s})">${s.replace('_',' ')}</div>${member?`<div class="tip-assignee-tag"><div class="status-dot" style="background:${member.color}"></div>${member.name}</div>`:''}</div>${task.notes?`<div class="tip-notes">"${task.notes}"</div>`:''}</div></div></div></div>`;
  });
  h+='</div>';
  if(phase.flow){h+=`<div class="flow-box"><div class="flow-label">Flujo completo</div><div class="flow-chain">`;phase.flow.forEach((s,i)=>{if(i>0)h+='<span class="flow-sep">→</span>';h+=`<span class="flow-chip">${s}</span>`});h+='</div></div>'}
  h+='</div></div>';return h;
}
function renderMilestone(m){const left=dayPos(m.date);return`<div class="milestone-row"><div class="milestone-label-area"><div class="milestone-diamond" style="background:${m.color};box-shadow:0 0 0 3px ${m.color}30"></div><div class="milestone-info"><span class="milestone-name" style="color:${m.color}">${m.name}</span><span class="milestone-sub">${m.sub}</span></div></div><div class="milestone-track"><div class="milestone-pip" style="left:${left}%"><div class="milestone-diamond" style="background:${m.color};box-shadow:0 0 0 3px ${m.color}30"></div><span class="milestone-date" style="color:${m.color};border-color:${m.color}40;background:${m.color}10">${m.dateLabel}</span></div></div></div>`}
function renderLaunch(m){const left=dayPos(m.date),type=m.id.includes('soft')?'soft':'official',letter=type==='soft'?'S':'O';return`<div class="launch-row ${type}"><div class="launch-label-area"><div class="launch-icon ${type}">${letter}</div><div class="launch-info"><span class="launch-title" style="color:${m.color}">${m.name}</span><span class="launch-subtitle">${m.sub}</span></div></div><div class="launch-track"><div class="launch-pip" style="left:${left}%"><div class="launch-diamond ${type}"></div><span class="launch-date-badge ${type}">${m.dateLabel}</span></div></div></div>`}
function renderStandalone(task){const left=dayPos(task.startDate),width=dayWidth(task.startDate,task.endDate),s=sc(task.status),member=getTeam(task.assignee),idx=data.standalone.indexOf(task);const rowClick=adminMode?`onclick="openEdit('standalone','',${idx})"`:'';const ec=adminMode?' editable':'';const op=task.opacity?`;opacity:${task.opacity}`:'';return`<div class="gantt-row${ec}" style="margin:4px 0" ${rowClick}><div class="row-label"><div class="status-dot status-${s}"></div><div class="row-label-text"><div class="name">${task.name}</div>${task.meta?`<div class="meta">${task.meta}</div>`:''}</div></div><div class="row-track"><div class="bar ${s}" style="left:${left}%;width:${width}%;background:${task.color}${op}"><div class="bar-content"><div class="bar-text">${task.name}</div></div>${member?`<div class="bar-avatar" title="${member.name}">${member.initials}</div>`:''}<div class="tip"><div class="tip-name">${task.name}</div><div class="tip-dates">${fmtRange(task.startDate,task.endDate)}</div><div class="tip-desc">${task.description}</div><div class="tip-meta"><div class="tip-tag" style="background:var(--status-${s})">${s.replace('_',' ')}</div></div>${task.notes?`<div class="tip-notes">"${task.notes}"</div>`:''}</div></div></div></div>`}

function toggleAdmin(){if(!adminMode&&!ghToken){document.getElementById('tokenModal').classList.add('show');return}adminMode=!adminMode;document.getElementById('adminToggle').classList.toggle('active',adminMode);document.getElementById('adminBadge').classList.toggle('show',adminMode);render()}
function saveToken(){ghRepo=document.getElementById('tokenRepo').value.trim();ghToken=document.getElementById('tokenInput').value.trim();ghBranch=document.getElementById('tokenBranch').value.trim()||'main';if(!ghRepo||!ghToken)return;document.getElementById('tokenModal').classList.remove('show');adminMode=true;document.getElementById('adminToggle').classList.add('active');document.getElementById('adminBadge').classList.add('show');render()}
function closeTokenModal(){document.getElementById('tokenModal').classList.remove('show')}
function openEdit(type,pid,idx){if(!adminMode)return;let task;if(type==='phase'){task=data.phases[pid].tasks[idx];editingSource={type,phaseId:pid,taskIndex:idx}}else{task=data.standalone[idx];editingSource={type,phaseId:'',taskIndex:idx}}editingTask=task;document.getElementById('editTitle').textContent=task.name;document.getElementById('editStatus').value=task.status||'pending';document.getElementById('editNotes').value=task.notes||'';const sel=document.getElementById('editAssignee');sel.innerHTML='<option value="">Unassigned</option>';(data.team||[]).filter(t=>t.id!=='unassigned').forEach(t=>{sel.innerHTML+=`<option value="${t.id}" ${task.assignee===t.id?'selected':''}>${t.name}</option>`});document.getElementById('editModal').classList.add('show')}
function closeModal(){document.getElementById('editModal').classList.remove('show');editingTask=null;editingSource=null}
async function saveEdit(){if(!editingTask||!editingSource)return;const st=document.getElementById('editStatus').value,as=document.getElementById('editAssignee').value,nt=document.getElementById('editNotes').value;if(editingSource.type==='phase'){const t=data.phases[editingSource.phaseId].tasks[editingSource.taskIndex];t.status=st;t.assignee=as;t.notes=nt}else{const t=data.standalone[editingSource.taskIndex];t.status=st;t.assignee=as;t.notes=nt}closeModal();render();if(ghToken&&ghRepo)await saveToGitHub()}
async function saveToGitHub(){try{const gr=await fetch(`https://api.github.com/repos/${ghRepo}/contents/data.json?ref=${ghBranch}`,{headers:{'Authorization':`Bearer ${ghToken}`,'Accept':'application/vnd.github.v3+json'}});const gj=await gr.json();fileSha=gj.sha;const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));const pr=await fetch(`https://api.github.com/repos/${ghRepo}/contents/data.json`,{method:'PUT',headers:{'Authorization':`Bearer ${ghToken}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:`Update: ${editingTask?editingTask.name:'task'}`,content,sha:fileSha,branch:ghBranch})});if(!pr.ok){const e=await pr.json();console.error('Save failed:',e);alert('Failed to save.')}}catch(e){console.error(e);alert('GitHub connection error.')}}
loadData();
</script>
</body>
</html>
