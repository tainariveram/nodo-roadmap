<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodo App — Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#fff;--bg-secondary:#f5f5f7;--text:#1d1d1f;--text-secondary:#86868b;
    --text-tertiary:#aeaeb2;--border:rgba(0,0,0,.06);
    --card-bg:rgba(255,255,255,.8);--card-border:rgba(0,0,0,.04);
    --card-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
    --tooltip-bg:rgba(255,255,255,.92);--tooltip-shadow:0 8px 40px rgba(0,0,0,.12);
    --hover-lift:translateY(-1px);--today-color:#ff3b30;--accent:#3BB1BD;
    --milestone-glow:rgba(232,168,56,.12);
    --modal-bg:rgba(255,255,255,.95);--overlay:rgba(0,0,0,.3);
    --status-done:#34c759;--status-progress:#007aff;--status-behind:#ff3b30;--status-pending:#aeaeb2;
  }
  body.dark{
    --bg:#000;--bg-secondary:#1c1c1e;--text:#f5f5f7;--text-secondary:#86868b;
    --text-tertiary:#48484a;--border:rgba(255,255,255,.08);
    --card-bg:rgba(28,28,30,.8);--card-border:rgba(255,255,255,.06);
    --card-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
    --tooltip-bg:rgba(28,28,30,.92);--tooltip-shadow:0 8px 40px rgba(0,0,0,.4);
    --milestone-glow:rgba(232,168,56,.08);
    --modal-bg:rgba(28,28,30,.95);--overlay:rgba(0,0,0,.6);
  }

  body{
    font-family:-apple-system,'Inter','SF Pro Display','Helvetica Neue',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    -webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
  }

  /* ── Top Bar ── */
  .top-bar{position:fixed;top:0;right:0;z-index:1000;display:flex;gap:8px;padding:20px 24px;}
  .icon-btn{
    width:36px;height:36px;border-radius:50%;border:none;background:var(--bg-secondary);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .3s;box-shadow:0 1px 4px rgba(0,0,0,.06);color:var(--text-secondary);
  }
  .icon-btn:hover{transform:scale(1.08);}
  .icon-btn.active{background:var(--accent);color:#fff;}

  /* ── Header ── */
  .header{padding:64px 64px 24px;max-width:1320px;margin:0 auto}
  .header h1{font-size:44px;font-weight:700;letter-spacing:-1px}
  .header .subtitle{font-size:17px;color:var(--text-secondary);font-weight:400;margin-top:4px}
  .app-summary{font-size:16px;color:var(--text-secondary);margin-top:10px;max-width:620px;line-height:1.55}

  /* ── Timeline ── */
  .timeline{padding:28px 64px 56px;max-width:1320px;margin:0 auto}

  .months-bar{
    display:grid;grid-template-columns:260px 1fr;margin-bottom:24px;
    position:sticky;top:0;z-index:100;
    background:var(--tooltip-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-radius:14px;padding:14px 20px;
    border:1px solid var(--card-border);box-shadow:0 2px 12px rgba(0,0,0,.04);
    transition:background .4s;
  }
  .months-track{display:grid;grid-template-columns:repeat(3,1fr)}
  .month-label{font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--text-tertiary);padding:0 0 0 4px;text-transform:uppercase}

  /* ── Phase Card ── */
  .phase{margin-bottom:28px}
  .phase-card{
    background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--card-border);border-radius:20px;padding:22px 28px 26px;
    box-shadow:var(--card-shadow);transition:box-shadow .3s;
  }
  .phase-top{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .phase-title{font-size:19px;font-weight:600;letter-spacing:-.3px}
  .phase-dates-label{font-size:14px;color:var(--text-secondary);font-weight:400;margin-left:6px}
  .phase-result-tag{
    margin-left:auto;font-size:13px;font-weight:500;padding:5px 14px;
    border-radius:100px;background:var(--bg-secondary);color:var(--text-secondary);
  }

  /* ── Gantt Rows ── */
  .gantt-rows{display:flex;flex-direction:column;gap:10px;overflow:visible}
  .gantt-row{display:grid;grid-template-columns:260px 1fr;align-items:center;min-height:44px;overflow:visible}
  .row-label{padding-right:16px;display:flex;align-items:center;gap:10px}
  .row-label-text .name{font-size:15px;font-weight:500;letter-spacing:-.1px}
  .row-label-text .meta{font-size:12px;color:var(--text-tertiary);line-height:1.45;margin-top:2px}
  .row-track{position:relative;height:34px;overflow:visible}

  .bar{
    position:absolute;height:28px;border-radius:7px;top:3px;
    transition:all .25s ease;cursor:pointer;overflow:visible;
  }
  .bar:hover{transform:var(--hover-lift);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:10}
  .bar .tip{
    display:none;position:absolute;bottom:calc(100% + 12px);left:0;
    background:var(--tooltip-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border);padding:16px 20px;border-radius:16px;
    width:320px;z-index:200;box-shadow:var(--tooltip-shadow);pointer-events:none;
  }
  .bar:hover .tip{display:block}
  .tip-name{font-size:15px;font-weight:600;margin-bottom:4px}
  .tip-dates{font-size:12px;color:var(--text-tertiary);margin-bottom:6px}
  .tip-desc{font-size:14px;color:var(--text-secondary);line-height:1.55;margin-bottom:8px}
  .tip-status{font-size:12px;font-weight:600;padding:3px 10px;border-radius:100px;display:inline-block}
  .tip-assignee{font-size:12px;color:var(--text-tertiary);margin-top:6px}
  .tip-notes{font-size:12px;color:var(--text-secondary);margin-top:6px;font-style:italic}

  /* ── Status Indicators ── */
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .status-done{background:var(--status-done)}
  .status-in_progress{background:var(--status-progress);animation:pulse 2s infinite}
  .status-behind{background:var(--status-behind);animation:pulse 1.5s infinite}
  .status-pending{background:var(--status-pending)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .bar.behind{box-shadow:inset 0 0 0 2px var(--status-behind)}
  .bar.done{opacity:.7}

  /* ── Assignee Badge ── */
  .assignee-badge{
    width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:600;color:#fff;flex-shrink:0;
  }

  /* ── Milestone ── */
  .milestone-row{
    display:grid;grid-template-columns:260px 1fr;align-items:center;
    min-height:56px;margin:16px 0;position:relative;
  }
  .milestone-row::before{
    content:'';position:absolute;inset:0;border-radius:14px;
    background:var(--milestone-glow);pointer-events:none;
  }
  .milestone-label-area{display:flex;align-items:center;gap:10px;padding-left:16px;z-index:1}
  .milestone-diamond{width:14px;height:14px;transform:rotate(45deg);border-radius:3px;flex-shrink:0}
  .milestone-info{z-index:1}
  .milestone-name{font-size:15px;font-weight:600;letter-spacing:-.2px;display:block}
  .milestone-sub{font-size:12px;color:var(--text-secondary);display:block;margin-top:2px}
  .milestone-track{position:relative;height:48px;z-index:1}
  .milestone-pip{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px}
  .milestone-date{
    font-size:13px;font-weight:600;white-space:nowrap;padding:4px 12px;
    border-radius:100px;background:var(--bg-secondary);border:1px solid var(--border);
  }

  /* ── Launch ── */
  .launch-row{
    display:grid;grid-template-columns:260px 1fr;align-items:center;
    min-height:68px;margin:20px 0;position:relative;
  }
  .launch-row::before{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none}
  .launch-row.soft::before{background:rgba(232,168,56,.1)}
  .launch-row.official::before{background:rgba(59,219,150,.1)}
  .launch-label-area{display:flex;align-items:center;gap:12px;padding-left:16px;z-index:1}
  .launch-icon{
    width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;color:#fff;font-weight:700;
  }
  .launch-icon.soft{background:#E8A838}
  .launch-icon.official{background:#3BDB96}
  .launch-info{z-index:1}
  .launch-title{font-size:17px;font-weight:700;letter-spacing:-.3px;display:block}
  .launch-subtitle{font-size:13px;color:var(--text-secondary);display:block;margin-top:2px}
  .launch-track{position:relative;height:56px;z-index:1}
  .launch-pip{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px}
  .launch-diamond{width:20px;height:20px;transform:rotate(45deg);border-radius:4px;flex-shrink:0}
  .launch-diamond.soft{background:#E8A838;box-shadow:0 0 0 4px rgba(232,168,56,.25),0 0 16px rgba(232,168,56,.15)}
  .launch-diamond.official{background:#3BDB96;box-shadow:0 0 0 4px rgba(59,219,150,.25),0 0 16px rgba(59,219,150,.15)}
  .launch-date-badge{
    font-size:14px;font-weight:600;white-space:nowrap;padding:6px 16px;
    border-radius:100px;border:1.5px solid;
  }
  .launch-date-badge.soft{color:#E8A838;border-color:rgba(232,168,56,.3);background:rgba(232,168,56,.08)}
  .launch-date-badge.official{color:#3BDB96;border-color:rgba(59,219,150,.3);background:rgba(59,219,150,.08)}

  /* ── Today ── */
  .today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--today-color);z-index:5;pointer-events:none;opacity:.6}
  .today-dot{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--today-color)}
  .today-label{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--today-color);letter-spacing:.5px}

  /* ── Parallel ── */
  .parallel-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-tertiary);letter-spacing:.3px;margin:6px 0 16px}
  .parallel-tag::before{content:'';width:12px;height:1px;background:var(--text-tertiary);opacity:.4}
  .parallel-wrap{border-left:2px solid var(--border);padding-left:20px;margin-left:6px}

  /* ── Flow ── */
  .flow-box{margin:12px 0 18px;padding:18px 20px;background:var(--bg-secondary);border-radius:14px}
  .flow-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
  .flow-chain{display:flex;align-items:center;flex-wrap:wrap;gap:3px;justify-content:center}
  .flow-chip{padding:6px 13px;border-radius:9px;font-size:13px;font-weight:500;background:var(--card-bg);border:1px solid var(--border);color:var(--text-secondary)}
  .flow-sep{color:var(--text-tertiary);font-size:16px;padding:0 3px}

  /* ── Legend ── */
  .legend{display:flex;gap:24px;padding:24px 64px;max-width:1320px;margin:0 auto;border-top:1px solid var(--border);flex-wrap:wrap;justify-content:center}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-tertiary)}
  .legend-pip{width:9px;height:9px;border-radius:3px}
  .legend-circle{width:9px;height:9px;border-radius:50%}
  .legend-diamond{width:9px;height:9px;transform:rotate(45deg);border-radius:2px;background:#E8A838}

  /* ── Edit Modal ── */
  .modal-overlay{
    position:fixed;inset:0;background:var(--overlay);z-index:2000;
    display:none;align-items:center;justify-content:center;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .modal-overlay.show{display:flex}
  .modal{
    background:var(--modal-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    border:1px solid var(--card-border);border-radius:24px;padding:32px;
    width:420px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.15);
  }
  .modal h3{font-size:19px;font-weight:600;margin-bottom:20px;letter-spacing:-.3px}
  .modal-field{margin-bottom:16px}
  .modal-field label{display:block;font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .modal-field select,.modal-field textarea,.modal-field input{
    width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);
    background:var(--bg-secondary);color:var(--text);font-family:inherit;font-size:14px;
    transition:border .2s;outline:none;
  }
  .modal-field select:focus,.modal-field textarea:focus,.modal-field input:focus{border-color:var(--accent)}
  .modal-field textarea{resize:vertical;min-height:60px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
  .btn{
    padding:10px 22px;border-radius:12px;font-size:14px;font-weight:600;border:none;
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-secondary{background:var(--bg-secondary);color:var(--text-secondary)}
  .btn-secondary:hover{background:var(--border)}

  /* ── Token Modal ── */
  .token-info{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:16px}
  .token-info a{color:var(--accent)}
  .token-info code{font-size:12px;background:var(--bg-secondary);padding:2px 6px;border-radius:4px}

  /* ── Admin indicator ── */
  .admin-badge{
    position:fixed;bottom:20px;right:20px;z-index:999;
    padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;
    background:var(--accent);color:#fff;
    box-shadow:0 4px 16px rgba(59,177,189,.3);
    display:none;
  }
  .admin-badge.show{display:block}

  /* ── Status legend in admin ── */
  .status-legend{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .status-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary)}

  /* ── Loading ── */
  .loading{text-align:center;padding:120px 0;font-size:17px;color:var(--text-secondary)}

  @media(max-width:768px){
    .header,.timeline,.legend{padding-left:24px;padding-right:24px}
    .header h1{font-size:32px}
    .gantt-row,.milestone-row,.launch-row,.months-bar{grid-template-columns:180px 1fr}
    .modal{padding:24px}
  }
</style>
</head>
<body>

<div class="top-bar">
  <button class="icon-btn" id="adminToggle" onclick="toggleAdmin()" title="Admin mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
    <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="admin-badge" id="adminBadge">Admin Mode</div>

<div id="app"><div class="loading">Loading roadmap...</div></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editTitle">Edit Task</h3>
    <div class="status-legend">
      <div class="status-legend-item"><div class="status-dot status-done"></div>Done</div>
      <div class="status-legend-item"><div class="status-dot status-in_progress"></div>In Progress</div>
      <div class="status-legend-item"><div class="status-dot status-behind"></div>Behind</div>
      <div class="status-legend-item"><div class="status-dot status-pending"></div>Pending</div>
    </div>
    <div class="modal-field">
      <label>Status</label>
      <select id="editStatus">
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
        <option value="behind">Behind Schedule</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Assignee</label>
      <select id="editAssignee"></select>
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="editNotes" placeholder="Add a note..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Token Modal -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>Connect to GitHub</h3>
    <div class="token-info">
      To save changes, enter a GitHub Personal Access Token with <code>repo</code> scope.<br><br>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=Nodo+Roadmap" target="_blank">Create token on GitHub</a>
    </div>
    <div class="modal-field">
      <label>Repository</label>
      <input id="tokenRepo" placeholder="owner/repo-name" />
    </div>
    <div class="modal-field">
      <label>Token</label>
      <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" />
    </div>
    <div class="modal-field">
      <label>Branch (optional)</label>
      <input id="tokenBranch" placeholder="main" value="main" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTokenModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveToken()">Connect</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let data = null;
let adminMode = false;
let ghToken = '';
let ghRepo = '';
let ghBranch = 'main';
let editingTask = null;
let editingSource = null; // { type: 'phase', phaseId, taskIndex } or { type: 'standalone', index }
let fileSha = '';

const TIMELINE_START = new Date('2026-03-01');
const TIMELINE_END = new Date('2026-05-31');
const TOTAL_DAYS = (TIMELINE_END - TIMELINE_START) / 864e5;

function dayPos(dateStr) {
  const d = new Date(dateStr);
  return ((d - TIMELINE_START) / 864e5 / TOTAL_DAYS * 100);
}

function dayWidth(startStr, endStr) {
  const s = new Date(startStr), e = new Date(endStr);
  return ((e - s) / 864e5 / TOTAL_DAYS * 100);
}

function todayPos() {
  const now = new Date();
  return Math.max(0, Math.min(100, (now - TIMELINE_START) / 864e5 / TOTAL_DAYS * 100));
}

const sunSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const moonSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

function toggleTheme() {
  document.body.classList.toggle('dark');
  document.getElementById('themeIcon').innerHTML = document.body.classList.contains('dark') ? sunSVG : moonSVG;
}

// ── Load Data ──
async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    data = await resp.json();
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Error loading data.json</div>';
    console.error(e);
  }
}

// ── Render ──
function render() {
  if (!data) return;
  const app = document.getElementById('app');
  const tp = todayPos();

  let html = `
    <div class="header">
      <h1>${data.config.title}</h1>
      <div class="subtitle">${data.config.subtitle}</div>
      <p class="app-summary">${data.config.summary}</p>
    </div>
    <div class="timeline">
      <div class="months-bar"><div></div><div class="months-track">
        <div class="month-label">Marzo</div><div class="month-label">Abril</div><div class="month-label">Mayo</div>
      </div></div>
      <div style="position:relative">
        <div style="display:grid;grid-template-columns:260px 1fr;position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none;z-index:5">
          <div></div><div style="position:relative"><div class="today-line" style="left:${tp}%"><div class="today-dot"></div><div class="today-label">HOY</div></div></div>
        </div>`;

  let inParallel = false;

  for (const item of data.layout) {
    if (item.type === 'phase') {
      html += renderPhase(item.id);
    } else if (item.type === 'milestone') {
      const m = data.milestones.find(x => x.id === item.id);
      if (m) html += renderMilestone(m);
    } else if (item.type === 'launch') {
      const m = data.milestones.find(x => x.id === item.id);
      if (m) html += renderLaunch(m);
    } else if (item.type === 'standalone') {
      const s = data.standalone.find(x => x.id === item.id);
      if (s) html += renderStandalone(s);
    } else if (item.type === 'parallel-start') {
      html += `<div class="parallel-tag">${item.label}</div><div class="parallel-wrap">`;
      inParallel = true;
    } else if (item.type === 'parallel-end') {
      html += '</div>';
      inParallel = false;
    }
  }

  html += '</div></div>';

  // Legend
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-pip" style="background:#3BB1BD"></div>Build</div>
    <div class="legend-item"><div class="legend-pip" style="background:#9B6DD7"></div>Testing</div>
    <div class="legend-item"><div class="legend-pip" style="background:#E8A838"></div>Control</div>
    <div class="legend-item"><div class="legend-pip" style="background:#3BDB96"></div>Escalamiento</div>
    <div class="legend-item"><div class="legend-pip" style="background:#5B8DEF"></div>Post-Launch</div>
    <div class="legend-item"><div class="legend-diamond"></div>Milestone</div>
    <div class="legend-item"><div class="legend-circle" style="background:var(--today-color)"></div>Hoy</div>
    <div class="legend-item"><div class="status-dot status-done"></div>Done</div>
    <div class="legend-item"><div class="status-dot status-in_progress"></div>In Progress</div>
    <div class="legend-item"><div class="status-dot status-behind"></div>Behind</div>
  </div>`;

  app.innerHTML = html;
}

function getTeamMember(id) {
  return (data.team || []).find(t => t.id === id);
}

function statusClass(s) { return s || 'pending'; }

function formatDateRange(start, end) {
  const fmt = d => { const dd = new Date(d); return dd.toLocaleDateString('es', { month: 'short', day: 'numeric' }); };
  return fmt(start) + ' – ' + fmt(end);
}

function renderPhase(phaseId) {
  const phase = data.phases[phaseId];
  if (!phase) return '';
  let h = `<div class="phase"><div class="phase-card">
    <div class="phase-top">
      <div class="phase-dot" style="background:${phase.color}"></div>
      <div><span class="phase-title">${phase.name}</span><span class="phase-dates-label">${phase.dates}</span></div>
      <div class="phase-result-tag">${phase.result}</div>
    </div><div class="gantt-rows">`;

  phase.tasks.forEach((task, i) => {
    const left = dayPos(task.startDate);
    const width = dayWidth(task.startDate, task.endDate);
    const sc = statusClass(task.status);
    const member = getTeamMember(task.assignee);
    const barStyle = task.striped
      ? `background:repeating-linear-gradient(-45deg,${phase.color}dd,${phase.color}dd 5px,${phase.color} 5px,${phase.color} 10px)`
      : `background:${phase.color}`;
    const dashStyle = task.dashed ? ';border-right:2px dashed rgba(0,0,0,.15)' : '';
    const adminClick = adminMode ? `onclick="openEdit('phase','${phaseId}',${i})"` : '';

    h += `<div class="gantt-row">
      <div class="row-label">
        <div class="status-dot status-${sc}"></div>
        ${member ? `<div class="assignee-badge" style="background:${member.color}" title="${member.name}">${member.initials}</div>` : ''}
        <div class="row-label-text"><div class="name">${task.name}</div>${task.meta ? `<div class="meta">${task.meta}</div>` : ''}</div>
      </div>
      <div class="row-track">
        <div class="bar ${sc}" style="left:${left}%;width:${width}%;${barStyle}${dashStyle}" ${adminClick}>
          <div class="tip">
            <div class="tip-name">${task.name}</div>
            <div class="tip-dates">${formatDateRange(task.startDate, task.endDate)}</div>
            <div class="tip-desc">${task.description}</div>
            <div class="tip-status status-${sc}" style="background:var(--status-${sc});color:#fff">${sc.replace('_',' ')}</div>
            ${member ? `<div class="tip-assignee">Assigned: ${member.name}</div>` : ''}
            ${task.notes ? `<div class="tip-notes">"${task.notes}"</div>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  });

  h += '</div>';

  // Flow diagram
  if (phase.flow) {
    h += `<div class="flow-box"><div class="flow-label">Flujo completo</div><div class="flow-chain">`;
    phase.flow.forEach((step, i) => {
      if (i > 0) h += '<span class="flow-sep">→</span>';
      h += `<span class="flow-chip">${step}</span>`;
    });
    h += '</div></div>';
  }

  h += '</div></div>';
  return h;
}

function renderMilestone(m) {
  const left = dayPos(m.date);
  const glowColor = m.color + '20';
  return `<div class="milestone-row" style="--milestone-glow:${glowColor}">
    <div class="milestone-label-area">
      <div class="milestone-diamond" style="background:${m.color};box-shadow:0 0 0 3px ${m.color}33"></div>
      <div class="milestone-info">
        <span class="milestone-name" style="color:${m.color}">${m.name}</span>
        <span class="milestone-sub">${m.sub}</span>
      </div>
    </div>
    <div class="milestone-track">
      <div class="milestone-pip" style="left:${left}%">
        <div class="milestone-diamond" style="background:${m.color};box-shadow:0 0 0 3px ${m.color}33"></div>
        <span class="milestone-date" style="color:${m.color}">${m.dateLabel}</span>
      </div>
    </div>
  </div>`;
}

function renderLaunch(m) {
  const left = dayPos(m.date);
  const type = m.id.includes('soft') ? 'soft' : 'official';
  const letter = type === 'soft' ? 'S' : 'O';
  return `<div class="launch-row ${type}">
    <div class="launch-label-area">
      <div class="launch-icon ${type}">${letter}</div>
      <div class="launch-info">
        <span class="launch-title" style="color:${m.color}">${m.name}</span>
        <span class="launch-subtitle">${m.sub}</span>
      </div>
    </div>
    <div class="launch-track">
      <div class="launch-pip" style="left:${left}%">
        <div class="launch-diamond ${type}"></div>
        <span class="launch-date-badge ${type}">${m.dateLabel}</span>
      </div>
    </div>
  </div>`;
}

function renderStandalone(task) {
  const left = dayPos(task.startDate);
  const width = dayWidth(task.startDate, task.endDate);
  const sc = statusClass(task.status);
  const member = getTeamMember(task.assignee);
  const idx = data.standalone.indexOf(task);
  const adminClick = adminMode ? `onclick="openEdit('standalone','',${idx})"` : '';
  const opacity = task.opacity ? `;opacity:${task.opacity}` : '';

  return `<div class="gantt-row" style="margin:4px 0">
    <div class="row-label">
      <div class="status-dot status-${sc}"></div>
      ${member ? `<div class="assignee-badge" style="background:${member.color}" title="${member.name}">${member.initials}</div>` : ''}
      <div class="row-label-text"><div class="name">${task.name}</div>${task.meta ? `<div class="meta">${task.meta}</div>` : ''}</div>
    </div>
    <div class="row-track">
      <div class="bar ${sc}" style="left:${left}%;width:${width}%;background:${task.color}${opacity}" ${adminClick}>
        <div class="tip">
          <div class="tip-name">${task.name}</div>
          <div class="tip-dates">${formatDateRange(task.startDate, task.endDate)}</div>
          <div class="tip-desc">${task.description}</div>
          <div class="tip-status status-${sc}" style="background:var(--status-${sc});color:#fff">${sc.replace('_',' ')}</div>
          ${member ? `<div class="tip-assignee">Assigned: ${member.name}</div>` : ''}
          ${task.notes ? `<div class="tip-notes">"${task.notes}"</div>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

// ── Admin Mode ──
function toggleAdmin() {
  if (!adminMode && !ghToken) {
    document.getElementById('tokenModal').classList.add('show');
    return;
  }
  adminMode = !adminMode;
  document.getElementById('adminToggle').classList.toggle('active', adminMode);
  document.getElementById('adminBadge').classList.toggle('show', adminMode);
  render();
}

function saveToken() {
  ghRepo = document.getElementById('tokenRepo').value.trim();
  ghToken = document.getElementById('tokenInput').value.trim();
  ghBranch = document.getElementById('tokenBranch').value.trim() || 'main';
  if (!ghRepo || !ghToken) return;
  document.getElementById('tokenModal').classList.remove('show');
  adminMode = true;
  document.getElementById('adminToggle').classList.add('active');
  document.getElementById('adminBadge').classList.add('show');
  render();
}

function closeTokenModal() {
  document.getElementById('tokenModal').classList.remove('show');
}

// ── Edit Modal ──
function openEdit(type, phaseId, taskIndex) {
  if (!adminMode) return;

  let task;
  if (type === 'phase') {
    task = data.phases[phaseId].tasks[taskIndex];
    editingSource = { type, phaseId, taskIndex };
  } else {
    task = data.standalone[taskIndex];
    editingSource = { type, phaseId: '', taskIndex };
  }
  editingTask = task;

  document.getElementById('editTitle').textContent = task.name;
  document.getElementById('editStatus').value = task.status || 'pending';
  document.getElementById('editNotes').value = task.notes || '';

  // Populate assignee dropdown
  const sel = document.getElementById('editAssignee');
  sel.innerHTML = '<option value="">Unassigned</option>';
  (data.team || []).filter(t => t.id !== 'unassigned').forEach(t => {
    sel.innerHTML += `<option value="${t.id}" ${task.assignee === t.id ? 'selected' : ''}>${t.name}</option>`;
  });

  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editingTask = null;
  editingSource = null;
}

async function saveEdit() {
  if (!editingTask || !editingSource) return;

  const status = document.getElementById('editStatus').value;
  const assignee = document.getElementById('editAssignee').value;
  const notes = document.getElementById('editNotes').value;

  // Update local data
  if (editingSource.type === 'phase') {
    data.phases[editingSource.phaseId].tasks[editingSource.taskIndex].status = status;
    data.phases[editingSource.phaseId].tasks[editingSource.taskIndex].assignee = assignee;
    data.phases[editingSource.phaseId].tasks[editingSource.taskIndex].notes = notes;
  } else {
    data.standalone[editingSource.taskIndex].status = status;
    data.standalone[editingSource.taskIndex].assignee = assignee;
    data.standalone[editingSource.taskIndex].notes = notes;
  }

  closeModal();
  render();

  // Save to GitHub
  if (ghToken && ghRepo) {
    await saveToGitHub();
  }
}

async function saveToGitHub() {
  try {
    // Get current file SHA
    const getResp = await fetch(`https://api.github.com/repos/${ghRepo}/contents/data.json?ref=${ghBranch}`, {
      headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const getJson = await getResp.json();
    fileSha = getJson.sha;

    // Update file
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const putResp = await fetch(`https://api.github.com/repos/${ghRepo}/contents/data.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${ghToken}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Update roadmap: ${editingTask ? editingTask.name : 'task'} status`,
        content: content,
        sha: fileSha,
        branch: ghBranch
      })
    });

    if (putResp.ok) {
      console.log('Saved to GitHub');
    } else {
      const err = await putResp.json();
      console.error('GitHub save failed:', err);
      alert('Failed to save to GitHub. Check console for details.');
    }
  } catch (e) {
    console.error('GitHub API error:', e);
    alert('Failed to connect to GitHub.');
  }
}

// ── Init ──
loadData();
</script>
